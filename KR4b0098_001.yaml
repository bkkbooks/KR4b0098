body:
  text: 卷一草廬對草廬對自董卓已來豪傑並起跨州連郡者不可勝數曹操比於袁紹則名微而眾寡然操遂能克紹以弱為彊者非惟天命抑亦人謀也今操已擁百萬之眾挾天子以令諸侯此誠不可與爭雄孫權據有江東已歷三世國險而民附賢能為之用此可以為援而不可圖也荊州北據漢沔利盡南海東連吳會西通巴蜀此用武之國而其主不能守此殆天所以資將軍將軍豈有意乎益州險塞沃野千里天府之土高祖因之以成帝業劉璋闇弱張魯在北民殷國富而不知存恤智能之士思得明君將軍既帝室之冑信義著於四海總攬英雄思賢如渴若跨有荊益保其巖阻西和諸戎南撫夷越外結好孫權內修政理天下有變則命一上將將荊州之軍以向宛洛將軍身率益州之眾以出秦川百姓孰敢不簞食壺漿以迎將軍者乎誠如是則霸業可成漢室可興矣三國志卷三十五蜀志諸葛亮傳為先帝與後帝遺詔朕初疾但下痢耳後轉雜他病殆不自濟人五十不稱夭年已六十有餘何所復恨不復自傷但以卿兄弟為念射君到說丞相歎卿智量甚大增修過於所望審能如此吾復何憂勉之勉之勿以善小而不為勿以惡小而為之惟賢惟德可以服人汝父德薄勿效之可讀漢書禮記閒暇歷觀諸子及六韜商君書益人意智聞丞相為寫申韓管子六韜一通已畢未送道亡可自更求聞達又詔吾亡之後汝兄弟父事丞相令卿與丞相共事而已為後帝伐魏詔朕聞天地之道福仁而禍淫善積者昌惡積者喪古今常數也是以湯武修德而王桀紂極暴而亡曩者漢祚中微網漏凶慝董卓造難震蕩京畿曹操階禍竊執天衡殘剝海內懷無君之心子丕孤豎敢尋亂階盜據神器更姓改物世濟其凶當此之時皇極幽昧天下無主則我帝命隕越於下昭烈皇帝體明叡之德光演文武應乾坤之運出身平難經營四方人鬼同謀百姓與能兆民欣戴奉順符讖建位易號丕承天序補弊興衰存復祖業誕膺皇綱不墜於地萬國未靜早世遐殂朕以幼沖繼統鴻基未習保傅之訓而嬰祖宗之重六合壅否社稷不建永惟所以念在匡救光載前緒未有攸濟朕甚懼焉是以夙興夜寐不敢自逸每從菲薄以益國用勸分務穡以阜民財授才任能以參其聽斷私降意以養將士欲奮劍長驅指討凶逆朱旗未舉而丕復隕喪斯所謂不然我薪而自焚也殘類餘醜又支天禍恣睢河洛阻兵未弭諸葛丞相弘毅忠壯忘身憂國先帝託以天下以勗朕躬今授之以旄鉞之重付之以專命之權統領步騎二十萬眾董督元戎龔行天伐除患寧亂克復舊都在此行也昔項籍總一彊眾跨州兼土所務者大然卒敗垓下死於東城宗族焚如為笑千載皆不以義陵上虐下故也今賊效尤天人所怨奉時宜速庶憑炎精祖宗威靈相助之福所向必克吳王孫權同恤災患潛軍合謀掎角其後涼州諸國王各遣月支康居胡侯支富康植等二十餘人詣受節度大軍北出便欲率將兵馬奮戈先驅天命既集人事又至師貞勢并必無敵矣夫王者之兵有征無戰尊而且義莫敢抗也故鳴條之役軍不血刃牧野之師商人倒戈今旍麾首路其所經至亦不欲窮兵極武有能棄邪從正簞食壺漿以迎王師者國有常典封寵大小各有品限及魏之宗族支葉中外有能規利害審順逆之數來詣降者皆原除之昔輔果絕親於智氏而蒙全宗之福微子去殷項伯歸漢皆受茅土之慶此前世之明驗也若其迷沈不返將助亂人不式王命戮其妻孥罔有攸赦廣宣恩威貸其元帥弔其殘民他如詔書律令丞相其露布天下使稱朕意焉三國志卷三十三蜀志後主傳裴注引諸葛亮集南征詔賜丞相亮金鈇鉞一其曲蓋一前後羽葆鼓吹一部虎賁六十人請宣大行皇帝遺詔表請宣大行皇帝遺詔表伏惟大行皇帝邁仁樹德覆燾無疆昊天不弔寢疾彌留今月二十四日奄忽升遐臣妾號咷若喪考妣乃顧遺詔事惟太宗動容損益百寮發哀滿三日除服到葬期後如禮其郡國太守相都尉縣令長三日便除服臣亮親受敕戒震畏神靈不敢有違臣請宣下奉行三國志卷三十二蜀志先主傳前出師表臣亮言先帝創業未半而中道崩殂今天下三分益州疲敝此誠危急存亡之秋也然侍衛之臣不懈於內忠志之士忘身於外者蓋追先帝之殊遇欲報之於陛下也誠宜開張聖聽以光先帝遺德恢弘志士之氣不宜妄自菲薄引喻失義以塞忠諫之路也宮中府中俱為一體陟罰臧否不宜異同若有作姦犯科及為忠善者宜付有司論其刑賞以昭陛下平明之治不宜偏私使內外異法也侍中侍郎敦攸之費禕董允等此皆良實志慮忠純是以先帝簡拔以遺陛下愚以為宮中之事事無大小悉以咨之然後施行必能裨補闕漏有所廣益也將軍向寵性行淑均曉暢軍事試用於昔日先帝稱之曰能是以眾議舉寵以為督愚以為營中之事事無大小悉以咨之必能使行陳和穆優劣得所也親賢臣遠小人此先漢所以興隆也親小人遠賢臣此後漢所以傾頹也先帝在時每與臣論此事未嘗不歎息痛恨於桓靈也侍中尚書長史參軍此悉貞亮死節之臣也願陛下親之信之則漢室之隆可指日而待也臣本布衣躬耕南陽苟全性命於亂世不求聞達於諸侯先帝不以臣卑鄙猥自枉屈三顧臣於草廬之中咨臣以當世之事由是感激遂許先帝以馳驅後值傾覆受任於敗軍之際奉命於危難之間邇來二十有一年矣先帝知臣謹慎故臨崩寄臣以大事也受命以來夙夜憂懼恐付託不效以傷先帝之明故五月渡瀘深入不毛今南方已定甲兵已足當獎率三軍北定中原庶竭駑鈍攘除姦兇興復漢室還于舊都此臣所以報先帝而忠陛下之職分也至於斟酌損益進盡忠言則攸之禕允之任也願陛下託臣以討賊興復之效不效則治臣之罪以告先帝之靈若無興德之言則戮允等以章其慢陛下亦宜自謀以諮諏善道察納雅言追惟先帝遺詔臣不勝受恩感激今當遠離臨表涕泣不知所云蜀志本傳後出師表先帝慮漢賊不兩立王業不偏安故託臣以討賊也以先帝之明量臣之才故知臣伐賊才弱敵彊也然不伐賊王業亦亡惟坐而待亡孰與伐之是故託臣而弗疑也臣受命之日寢不安席食不甘味思惟北征宜先入南故五月渡瀘深入不毛并日而食臣非不自惜也顧王業不可偏安於蜀都故冒危難以奉先帝之遺意也而議者謂為非計今賊適疲於西又務於東兵法乘勢此進趨之時也謹陳其事如左高帝明並日月謀臣淵深然涉險被創危然後安今陛下未及高帝謀臣不及良平而欲以長計取勝坐定天下此臣之未解一也劉繇王朗各據州郡論安言計舉引聖人群疑滿腹眾難塞胸今歲不戰明年不征使孫策坐大遂并江東此臣之未解二也曹操智計殊絕於人其用兵也髣髴孫吳然困於南陽險於烏巢危於祁連偪於黎陽幾敗北山殆死潼關然後偽定一時耳況臣才弱而欲以不危而定之此臣之未解三也曹操五攻昌霸不下四越巢湖不成任用李服而李服圖之委任夏侯而夏侯敗亡先帝每稱操為能猶有此失況臣駑下何能必勝此臣之未解四也自臣到漢中中間朞年矣然喪趙雲陽群馬玉閻芝丁立白壽劉郃鄧銅等及曲長屯將七十餘人突將無前賨叟青羌散騎武騎一千餘人此皆數十年之內所糾合四方之精銳非一州之所有若復數年則損三分之二也當何以圖敵此臣之未解五也今民窮兵疲而事不可息事不可息則住與行勞費正等而不及虛圖之欲以一州之地與賊持久此臣之未解六也夫難平者事也昔先帝敗軍於楚當此之時曹操拊手謂天下已定然後先帝東連吳越西取巴蜀舉兵北征夏侯授首此操之失計而漢事將成也然後吳更違盟關羽毀敗秭歸蹉跌曹丕稱帝凡事如此難可逆見臣鞠躬盡力死而後已至於成敗利鈍非臣之明所能逆覩也蜀志本傳裴松之注裴注云出張儼默記薦呂凱表永昌郡吏呂凱府丞王伉等執忠絕域十有餘年雍闓高定偪其東北而凱等守義不與交通臣不意永昌風俗敦直乃爾三國志卷四十三蜀志呂凱傳彈李嚴表嚴少為郡職吏用性深刻苟利其身鄉里為嚴諺曰難可狎李鱗甲太平御覽卷四百九十六彈李平表自先帝崩後平所在治家尚為小惠安身求名無憂國之事臣當北出欲得平兵以鎮漢中平窮難縱橫無有來意而求以五郡為巴州刺史去年臣欲西征欲令平主督漢中平說司馬懿等開府辟召臣知平鄙情欲因行之際偪臣取利也是以表平子豐督主江州隆崇其遇以取一時之務耳平至之日都委諸事群臣上下皆怪臣待平之厚也正以大事未定漢室傾危伐平之短莫若襃之然謂平情在於榮利而已不意平心顛倒乃爾若事稽留將致禍敗是臣不敏言多增咎三國志卷四十蜀志李嚴傳彈廖立表長水校尉廖立坐自貴大臧否群士公言國家不任賢達而任俗吏又言萬人率者皆小子也誹謗先帝疵毀眾臣人有言國家兵眾簡練部伍分明者立舉頭視屋憤詫作色曰何足言凡如是者不可勝數羊之亂群猶能為害況立託在大位中人以下識真偽耶三國志卷四十蜀志廖立傳又彈廖立立奉先帝無忠孝之心守長沙則開門就敵領巴郡則有闇昧闒茸其事隨大將軍則誹謗譏訶侍梓宮則挾刃斷人頭於梓宮之側陛下即位之後普增職號立隨比為將軍面語臣曰我何宜在諸將軍中不表我為卿上當在五校臣答將軍者隨大比耳至於卿者正方亦未為卿也且宜處五校自是之後怏怏懷恨三國志卷四十蜀志廖立傳裴注引諸葛亮集公文上尚書平為大臣受恩過量不思忠報橫造無端危恥不辨迷罔上下論獄棄科導人為奸俠情狂志若無天地自度姦露嫌心遂生聞軍臨至西嚮託疾還沮漳軍臨至沮復還江陽平參軍狐忠勸諫乃止今纂賊未滅社稷多難國事惟和可以克捷不可苞含以危大業輒與行中軍師車騎將軍都鄉侯臣劉琰使持節前軍師征西大將軍領涼州刺史南鄭侯臣魏延前將軍都亭侯臣袁琳左將軍領荊州刺史高陽鄉侯臣吳壹督前部右將軍玄鄉侯臣高翔督後部後將軍安樂亭侯臣吳班領長史綏軍將軍臣楊儀督左部行中監軍揚武將軍臣鄧芝行前監軍征南將軍臣劉巴行中護軍偏將軍臣費禕行前護軍偏將軍漢成亭侯臣許允行左護軍篤信中郎將臣丁咸行右護軍偏將軍臣劉敏行護軍征南將軍當陽亭侯臣姜維行中典軍討虜將軍臣上官雝行中參軍昭武中郎將臣胡濟行參軍建義將軍臣閻晏行參軍偏將軍臣爨習行參軍裨將軍臣杜義行參軍武略中郎將臣杜祺行參軍綏戎都尉臣盛勃領從事中郎武略中郎將臣樊岐等議輒解平任免官祿節傳印綬符策削其爵土三國志卷四十蜀志李嚴傳裴注引上言追尊甘夫人為昭烈皇后上言追尊甘夫人為昭烈皇后皇思夫人履行修仁淑慎其身大行皇帝昔在上將嬪妃作合載育聖躬大命不融大行皇帝存時篤義垂恩念皇思夫人神柩在遠飄颻特遣使者奉迎會大行皇帝崩今皇思夫人神柩已到又梓宮在道園陵將成安厝有期臣輒與太常臣賴恭等議禮記曰立愛自親始教民孝也立敬自長始教民順也不忘其親所繇生也春秋之義母以子貴昔高皇帝追尊太上昭靈夫人為昭靈皇后孝和皇帝改葬其母梁貴人尊號曰恭懷皇后孝愍皇帝亦改葬其母王夫人尊號曰靈懷皇后今皇思夫人宜有尊號以慰寒泉之思輒與恭等案諡法宜曰昭烈皇后詩曰穀則異室死則同穴故昭烈皇后宜與大行皇帝合葬臣請太尉告宗廟布露天下具禮儀別奏三國志卷三十四蜀志甘皇后傳上事表上事表臣先遣虎步監孟琰據武功水東司馬懿因渭水漲以二十日出騎萬人來攻琰營臣作車橋越水射之橋成馳去太平御覽卷七十三祁山表祁山去沮縣五百里有民萬戶矚其丘墟信為殷矣水經注卷二十漾水注表耽文山澤山司彌瘞山婁山辟龍山舉蔣琬密表舉蔣琬密表臣若不幸後事宜以付琬三國志卷四十四蜀志蔣琬傳臨終遺表臨終遺表伏念臣賦性拙直遭時艱難興師北伐未獲全功何期病在膏肓命垂旦夕伏願陛下清心寡慾約己愛民達孝道於先君布仁心於寰宇提拔隱逸以進賢良屏黜姦讒以厚風俗臣初奉先帝資仰於官不自治生今臣家成都有桑八百株薄田十五頃子孫衣食自有餘饒臣身在外無別調度隨時衣食悉仰於官不別治生以長尺寸若臣死之日不使內有餘帛外有盈財以負陛下也蜀志本傳街亭自貶疏臣以弱才叨竊非據親秉旄鉞以厲三軍不能訓章明法臨事而懼至有街亭違命之闕箕谷不戒之失咎皆在臣授任無方臣明不知人料事多闇春秋責帥臣職是當請自貶三等以督厥咎蜀志本傳正議昔在項羽起不由德雖處華夏秉帝者之勢卒就湯鑊為後永戒魏不審鑒今次之矣免身為幸刑在子孫而二三子各以耆艾之齒承偽指而進書有若崇竦稱莽之功亦將偪於元禍苟免者耶昔世祖之創跡舊基奮羸卒數千摧莽彊旅四十餘萬於昆陽之郊夫據道討淫不在眾寡及至孟德以其譎勝之力舉數十萬之師救張郃於陽平勢窮慮悔僅能自脫辱其鋒銳之眾遂喪漢中之地深知神器不可妄獲旋還未至感毒而死子桓淫逸繼之以纂縱使二三子多逞蘇張詭靡之說奉進驩兜滔天之辭欲以誣毀唐帝諷解禹稷所謂徒喪文藻煩勞翰墨者矣夫大人君子之所不為也又軍誡曰萬人必死橫行天下昔軒轅氏整卒數萬制四方定海內況以數十萬之師據正道而臨有罪有可得而干擬者哉蜀志本傳裴注引諸葛亮集絕盟好議權有僭逆之心久矣國家所以略其釁情者求犄角之援也今若加顯絕讎我必深便當移兵東伐與之角力須并其土乃議中原彼賢才尚多將相輯穆未可一朝定也頓兵相持坐而須老使北賊得計非策之上者若孝文卑辭匈奴先帝優與吳盟皆應權通變弘思遠益非匹夫之為忿者也今議者咸以權利在鼎足不能并力且志望以滿無上岸之情推此皆似是而非也何者其智力不侔故限江自保權之不能越江猶魏賊之不能渡漢非力有餘而利不取也若大軍致討彼高當分裂其地以為後規下當略民廣境示武於內非端坐者也若就其不動而睦於我我之北伐無東顧之憂河南之眾不得盡西此之為利亦已深矣權僭之罪未宜明也蜀志本傳裴注引漢晉春秋上先帝書上先帝書亮夜算太乙數今年歲次癸巳罡星在西方又觀乾象太白臨於雒城之分主於將帥多凶少吉為法正答或問書主公之在公安也北畏曹公之彊東憚孫權之偪近則懼孫夫人生變於肘腋之下當斯之時進退狼跋法孝直為之輔翼令翻然翱翔不可復制如何禁止孝直使不得行其意耶三國志卷三十七蜀志法正傳答法正書君知其一未知其二秦以亡道政苛民怨匹夫大呼天下土崩高祖因之可以弘濟劉璋闇弱自焉以來有累世之恩文法羈縻互相承奉德政不舉威刑不肅蜀土人士專權自恣君臣之道漸以陵替寵之以位位極則賤順之以恩恩竭則慢所以致弊實由於此吾今威之以法法行則知恩限之以爵爵加則知榮恩榮並濟上下有節為治之要於斯而著矣蜀志本傳裴注引郭沖五事答關羽書答關羽書孟起兼資文武雄烈過人一世之傑黥彭之徒當與益德並驅爭先猶未及髯之絕倫逸群也三國志卷三十六蜀志關羽傳與杜微書與杜微書服聞德行饑渴歷時清濁異流無緣咨覯王元泰李伯仁王文儀楊季休丁君幹李永南兄弟文仲寶等每歎高志未見如舊猥以空虛統領貴州德薄任重慘慘憂慮朝廷主公今年始十八天資仁敏愛德下士天下之人思慕漢室欲與君因天順民輔此明主以隆季興之功著勳於竹帛也以謂賢愚不相為謀故自割絕守勞而已不圖自屈也三國志卷四十二蜀志杜微傳答杜微書答杜微書曹丕纂弒自立為帝是猶土龍芻狗之有名也欲與群賢因其邪偽以正道滅之怪君未有相誨便欲求還於山野丕又大興勞役以向吳楚今因丕多務且以閉境勤農育養民物並治甲兵以待其挫然後伐之可使兵不戰民不勞而天下定也君但當以德輔時耳不責君軍事何為汲汲欲求去乎同前答李恢書行當離別以為惆悵今致氍一以達心也太平御覽卷七百八與劉巴書劉公雄才蓋世據有荊土莫不歸德天人去就已可知矣足下欲何之三國志卷三十九蜀志劉巴傳裴注引零陵先賢傳與劉巴論張飛書張飛雖實武人敬慕足下主公今方收合文武以定大事足下雖天素高亮宜少降意也同前答李嚴書吾與足下相知久矣可不復相解足下方誨以光國戒之以勿拘之道是以未得默已吾本東方下士誤用於先帝位極人臣祿賜百億今討賊未效知己未答而方寵齊晉坐自貴大非其義也若滅魏斬叡帝還故居與諸子並升雖十命可受況於九耶三國志卷四十蜀志李嚴傳裴注引諸葛亮集又與李嚴書吾受賜八十萬斛今蓄財無餘妾無副服北堂書鈔卷三十八與張魯書靈仙養命猶節松霞而享身嗜味奚能尚道藝文類聚與張裔書君昔在陌下營壞吾之用心食不知味後流迸南海相為悲歎寢不安席及其來還委付大任同獎王室自以為與君古之石交也石交之道舉讎以相益割骨肉以相明猶不相謝也況吾但委意於元儉而君不能忍耶三國志卷四十一蜀志楊洪傳與張裔蔣琬書姜伯約忠勤時事思慮精密考其所有永南季常諸人不如也其人涼州上士也三國志卷四十四蜀志姜維傳又與張裔蔣琬書須先教中虎步兵五六千人姜伯約甚敏於軍事既有膽義深解兵意此人心存漢室而才兼於人畢教軍事當遣詣宮覲見主上同前令史失賴厷掾屬喪楊禺為朝中損益多矣三國志卷四十五蜀志楊戲傳注與蔣琬董允書孝起前臨至吳為吾說正方腹中有鱗甲鄉黨以為不可近吾以為鱗甲者但不當犯之耳不圖復有蘇張之事出於不意可使孝起知之三國志卷三十九蜀志陳震傳與孟達論李嚴書部分如流趣拾罔滯正方性也三國志卷四十蜀志李嚴傳與孟達書往年南征歲末乃還適與李鴻會於漢陽承知消息嘅然永嘆以存足下平素之志豈徒空託名榮貴為乖離乎嗚呼孟子斯實劉封侵陵足下以傷先帝待士之義又鴻道王沖造作虛語云足下量度吾心不受沖說尋表明之言追平生之好依依東望故遣有書三國志卷四十一蜀志費詩傳與步騭書僕前軍在五丈原原在武功西十里馬冢在武功東十餘里有高勢攻之不便是以留耳水經注卷十八渭水注與陸遜書家兄年老而恪性疏今使典主糧穀糧穀軍之要最僕雖在遠竊用不安足下特為啟至尊轉之三國志卷六十四吳志諸葛恪傳裴注引江表傳與孫權書漢室不幸王綱失紀曹賊纂逆蔓延及今皆思勦滅未遂同盟亮受昭烈皇帝寄託之重敢不竭力盡忠今大兵已會於祁山狂寇將亡於渭水伏望執事以同盟之義命將北征共靖中原同匡漢室書不盡言萬希昭鑒藝文類聚又與孫權書所送白眊薄少重見辭謝益以增慚太平御覽卷三百四十一答司馬懿書使杜子緒宣意於公威也三國志卷十五魏志溫恢傳裴注引魏略與兄瑾論白帝兵書與兄瑾論白帝兵書兄嫌白帝兵非精練到所督則先帝帳下白眊西方上兵也嫌其少也當復部分江州兵以廣益之太平御覽卷三百四十一與兄瑾言趙雲燒赤崖閣道書與兄瑾言趙雲燒赤崖閣道書前趙子龍退軍燒壞赤崖以北閣道緣谷一百餘里其閣梁一頭入山腹其一頭立柱於水中今水大而急不得安柱此其窮極不可彊也水經注卷二十七沔水注與兄瑾言大水赤崖橋閣悉壞書頃大水暴出赤崖以南橋閣悉壞時趙子龍與鄧伯苗一戍赤崖屯田一戍赤崖口但得緣崖與伯苗相聞而已同前與兄瑾言治綏陽谷書與兄瑾言治綏陽谷書有綏陽小谷雖山崖絕重谿水縱橫難用行軍昔邏候往來要道通人今使前軍斫治此道以向陳倉足以扳連賊勢使不得分兵東行者也水經注卷十七渭水注與兄瑾論陳震書孝起忠純之性老而益篤及其贊述東西歡樂和合有可貴者三國志卷三十九蜀志陳震傳與兄瑾言孫松書既受東朝厚遇依依於子弟又子喬良器為之惻愴見其所與亮器物感用流涕三國志卷五十一吳志孫翊傳與兄瑾言殷禮書殷德嗣秀才今之僑肸者也太平御覽卷一千與兄瑾言子喬書喬本當還成都今諸將子弟皆得傳運思惟宜同榮辱今使喬督五六百兵與諸子弟傳於谷中蜀志本傳裴松之注與兄瑾言子瞻書瞻今已八歲聰慧可愛嫌其早成恐不為重器耳蜀志本傳誡子書夫君子之行靜以修身儉以養德非澹薄無以明志非寧靜無以致遠夫學須靜也才須學也非學無以廣才非靜無以成學慆慢則不能研精險躁則不能治性年與時馳意與日去遂成枯落多不接世悲守窮廬將復何及太平御覽卷四百五十九又誡子書夫酒之設合禮致情適體歸性禮終而退此和之至也主意未殫賓有餘倦可以至醉無致於亂太平御覽卷四百九十七誡外生書夫志當存高遠慕先賢絕情慾棄凝滯使庶幾之志揭然有所存惻然有所感忍屈伸去細碎廣咨問除嫌吝雖有淹留何損於美趣何患於不濟若志不彊毅意不慷慨徒碌碌滯於俗默默束於情永竄伏於凡庸不免於下流矣太平御覽卷四百五十九
