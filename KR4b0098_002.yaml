body:
  text: 卷二答蔣琬教思惟背親捨德以殄百姓衆人既不隱於心實又使遠近不解其義是以君宜顯其功舉以明此選之清重也三國志卷四十四蜀志蔣琬傳與李豐教與李豐教吾與君父子戮力以獎漢室此神明所聞非但人知之也表都護典漢中委君於東關者不與人議也謂至心感動終始可保何圖中乖乎昔楚卿屢絀亦乃克復思道用福應自然之數也願寬慰都護勤追前闕今雖解任形業失故奴婢賓客百數十人君以中郎參軍居府方之氣類猶為上家若都護思負一意君與公琰推心從事者否可復通逝可復還也詳思斯戒明吾用心臨書長嘆泣涕而已三國志卷四十蜀志李嚴傳裴注引與張裔教與張裔教去婦不顧門萎韭不入園以婦人之性草萊之情猶有所恥想忠壯者意何所之太平御覽卷九百七十六黜來敏教黜來敏教將軍來敏對上官顯言新人有何功德而奪我榮資與之耶諸人共憎我何故如是敏年老狂悖生此怨言昔成都初定議者以為來敏亂群先帝以新定之際故遂含容無所禮用後劉子初選以為太子家令先帝不悅而不忍拒也今上即位吾暗於知人遂復擢為將軍祭酒違議者之審見背先帝所疏外自謂能以敦厲薄俗帥之以義今既不能表退職使閉門思愆三國志卷四十二蜀志來敏傳裴注引稱姚胄教稱姚胄教忠益者莫大於進人進人者各務其所尚今姚掾並存剛柔以廣文武之用可謂博雅矣願諸掾各希此事以屬其望三國志卷四十五蜀志楊戲傳注引與群下教與群下教夫參署者集衆思廣忠益也若遠小嫌難相違覆曠闕損矣違覆而得中猶棄敝蹻而獲珠玉然人心苦不能盡惟徐元直處此不惑又董幼宰參署七年事有不至至於十反來相啓告苟能慕元直之十反幼宰之殷勤有忠於國則亮可少過矣三國志卷三十九蜀志董和傳又與群下教昔初交州平屢聞得失後交元直勤見啓誨前參軍於幼宰每言則盡後從事於偉度數有諫止雖資性鄙暗不能悉納然與此四子終始好合亦足以明其不疑於直言也同前與參軍掾屬教任重才輕故多闕漏前參軍董幼宰每言輒盡數有諫益雖性鄙薄不能悉納幼宰參署七年事有不至至於十反未有忠於國如幼宰者也亮可以少過矣太平御覽卷二百四十九勸將士勤攻己闕教大軍在祁山箕谷皆多於賊而不能破賊為賊所破者則此病不在兵少也在一人耳今欲減兵省將明罰思過校變通之道於將來若不能然者雖兵多何益自今以後諸有忠慮於國但勤攻吾之闕則事可成賊可死功可蹻足而待矣蜀志本傳裴注引漢晉春秋教昔孫叔敖乘馬三年不知牝牡稱其賢也藝文類聚卷九十三今民貧國虛決敵之資惟仰錦耳太平御覽卷八百十五轉運教轉運教計一歲運用蓬旅簟千萬具太平御覽卷七百八南征教用兵之道攻心為上攻城為下心戰為上兵戰為下作斧教前後所作斧都不可用前到武都一日鹿角壞刀環千餘枚賴賊已走若未走無所復用問自令作部刀斧數百枚用之百餘日初無壞者爾乃知彼主者無意宜收治之非小事也若臨敵敗人軍事矣太平御覽卷三百三十七七百六十三作匕首教作部作匕首五百枚以給騎士北堂書鈔卷一百二十三作剛鎧教作剛鎧教敕作部皆作五折剛鎧十折矛以給之太平御覽卷三百五十三賊騎來教賊騎來教若賊騎左右來至徒從行以戰者陟嶺不便宜以車蒙陳而待之地狹者以鋸齒而待之北堂書鈔卷一百十七軍令聞雷鼓音舉白幢絳旗大小船皆進戰不進者斬聞金音舉青旗船皆止進者斬若賊近徐還遠者疾還北堂書鈔卷一百二十聞鼓音舉黃帛兩半幡合旗為三面員陳北堂書鈔卷一百十七連衝之陳以狹而厚為利陳令騎不得與相離護側騎與相遠北堂書鈔卷一百十七敵以來進持鹿角兵悉卻在連衝後敵已附鹿角裏兵但得進踞以矛戟刺之不得此駐起駐妨弩壞太平御覽卷三百十七始出營豎矛戟舒幡旗鳴鼓角行三里辟矛戟結幡旗止鼓角未至營三里復豎矛戟舒幡旗鳴鼓角至營復結幡旗止鼓角違令者髡太平御覽卷三百三十九戰時皆取船上布幔布衣漬水中積聚之以助水淹賊有火炬火箭以掩滅之也違令者髡翦耳北堂書鈔卷一百三十二選三部司馬皆限力舉二百斤以上前驅司馬便大戟田基司馬取能挽一石七斗以上弓太平御覽凡戰臨陳皆無歡譁明聽鼓音靜視幡麾麾前則前麾後則後麾左則左麾右則右不聞令而擅前後左右者斬太平御覽卷三百四十一軍行濟河主者常先沈白璧文曰某主使者某甲敢告於河賤臣某甲作亂天子使某帥衆濟河征討醜類故以璧沈惟爾有神裁之太平御覽卷五百二十六兩頭進戰視麾所指聞三金音止二金音還太平御覽卷三百四十一軍列營步騎士以下皆著兜鍪太平御覽卷三百五十六帳下及右陳各持彭排太平御覽卷三百五十七金鼓幢麾隆衝皆以立秋日祠先時一日主者請祠其主者奉祠若出征有所剋獲還亦祠向敵祠血于鐘鼓秋祠及有所剋獲但祠不血鐘鼓祝文某官使主者某敢告隆衝鐘鼓幢麾夫軍武之器者所以正不義為民除害也謹以立秋之日潔牲黍稷旨酒而敬薦之太平御覽卷五百二十六今荊州非少人也而著籍者寡平居發調則人心不説可語劉荊州令國中凡有遊戶皆使自實因録以益衆可也蜀志本傳裴注引魏略嘗以己丑日祠牛馬先祝文曰某月己丑某甲敢告牛馬先馬者用兵之道牛者軍農之用謹潔牲黍稷旨酒敬而薦之太平御覽卷五百二十六兵法知有所甚愛知有所不足愛可以用兵矣故夫善將者以其所不足愛者養其所甚愛者士之不能皆鋭馬之不能皆良器械之不能皆堅固也處之而已矣兵之有上中下也是兵之有三權也孫臏有言曰以君下駟與彼上駟取君上駟與彼中駟取君中駟與彼下駟此兵説也非馬説也下下之不足以與其上也吾既知之矣吾既棄之矣中之不足以與吾上下之不足以與吾中吾不既再勝矣乎得之多於棄也吾斯從之矣彼其上之有三權也三權也者以一權而致二者也管子曰攻堅則瑕者堅攻瑕則堅者瑕嗚乎不從其瑕而攻之天下皆強敵也兵法祕訣鎮星所在之宿其國不可伐又彗星見大明臣下縱橫民流亡無所食父子死離夫婦不相得四維有流星前如甕後如火光景天如雷聲名曰天狗其下飢荒民疾疫群臣死流星東北行名天岡天海之口必有大水土功又四維有流星入以後有白氣如雲狀如車輪是謂齧食其下大兵中國多盜賊又有星如鬭見北斗名為旬始天下大亂諸侯爭雄太平御覽卷三百二十八兵要軍已近敵羅落常平明以先發絶軍前十里內各案左右下道亦十里之內數里之外五人為部人持一白幡登高外向明看隱蔽之處軍至轉尋高而前第一見賊轉語後第二第一詣主者白之凡候見賊百人以下但舉幡指百人以上便舉幡大呼主者遣疾馬往視察之太平御覽卷三百三十一凡軍行營壘先使腹心及鄉導前覘審知各令候吏先行定得營地壁立軍分數立四表候視然後移營又先使候騎前行持五色旗見溝坑揭黃衢路揭白水澗揭黑林藪揭青野火揭赤以本鼓應之立旗鼓令相聞見若渡水踰山深邃林藪精驍勇騎投搜數里無聲四周絶迹高山樹頂令人遠視精兵四向要處防禦然後分兵前後以為鎮拓乃令輜重老小次步後馬切在整肅防敵至人馬無聲不失行列險地邪徑亦以部曲鱗次或須環回旋轉以後為前以左為右行則魚貫立則雁行到前止處遊騎精鋭四向散列而立各依本方下營一人一步隨師多少咸表十二辰豎立旗長二丈八尺審子午卯酉地勿令邪僻以朱雀旗豎午地白虎旗豎酉地玄武旗豎子地青龍旗登卯地招搖旗豎中央其樵牧飲食不得出表外也太平御覽卷三百三十一人之忠也猶魚之有淵魚失水則死人失忠則凶故良將守之志立而名揚太平御覽卷二百七十三不愛尺璧而愛寸陰者時難遭而易失也故良將之趨時也衣不解帶足不躡地同前責之而不驕委之而不專扶之而不隱免之而不懼故良將之動也猶璧之不朽同前良將之為政也使人擇之不自舉使法量功不自度故能者不可蔽不能者不可飾妄譽者不能進也同前言行不同豎私枉公外相連誣內相謗訕有此不去是謂敗亂北堂書鈔卷一百十三枝葉強大比居同勢各結朋黨競進憸人有此不去是謂敗徵同前有制之兵無能之將不可以敗無制之兵有能之將不可以勝督將以下各自有幡軍發時幡指天者勝北堂書鈔卷一百二十若能力兼三人身與馬如膠漆手與劍如飛虻誠宜寵嘉太平御覽作木牛流馬法木牛者方腹曲頭一腳四足頭入頷中舌著於腹載多而行少宜可大用不可小使特行者數十里群行者二十里也曲者為牛頭雙者為牛腳橫者為牛領轉者為牛足覆者為牛背方者為牛腹垂者為牛舌曲者為牛肋刻者為牛齒立者為牛角細者為牛鞅攝者為牛鞦軸牛仰雙轅人行六尺牛行四步載一歲糧日行二十里而人不大勞流馬尺寸之數肋長三尺五寸廣三寸厚二寸二分左右同前軸孔分墨去頭四寸徑中二寸前腳孔分墨二寸去前軸孔四寸五分廣一寸前杠孔去前腳孔分墨二寸七分孔長二寸廣一寸後軸孔去前杠分墨一尺五分大小與前同後腳孔分墨去後軸孔三寸五分大小與前同後杠孔去後腳孔分墨二寸七分後載剋去後杠孔分墨四寸五分前杠長一尺八寸廣二寸厚一寸五分後杠與等板方囊二枚厚八分長二尺七寸高一尺六寸五分廣一尺六寸每枚受米二斛三斗從上杠孔去肋下七寸前後同上杠孔去下杠孔分墨一尺三寸孔長一寸五分廣七分八孔同前後四腳廣二寸厚一寸五分形制如象靬長四寸徑面四寸三分孔徑中三腳杠長二尺一寸廣一寸五分厚一寸四分同杠耳蜀志本傳裴注引諸葛亮集八陳圖法八陳既成自今行師庶不覆敗矣水經注朝發南鄭箋朝發南鄭莫宿黑水四五十里水經注卷二十七沔水注師徒遠涉帖師徒遠涉道里甚艱自及褒斜幸皆無恙使還馳此不復旦太平御覽漢嘉金書漢嘉金朱提銀采之不足以自食郡國志注論交勢利之交難以經遠士之相知溫不增華寒不改葉能貫四時而不衰歷險夷而益固太平御覽卷四百六引要覽論光武曹植曰漢之二祖俱起布衣高祖闕於微細光武知於禮義高祖又鮮君子之風溺儒冠不可言敬辟陽淫辟與衆共之詩書禮樂帝堯之所以為治也而高祖輕之濟濟多士文王之所以獲寧也而高祖蔑之不用聽戚姬之邪媚致呂氏之暴戾果令凶婦肆鴆酷之心凡此諸事豈非寡計淺慮斯不免於閭閻之人當世之匹夫也世祖多識仁智奮武略以攘暴興義兵以掃殘破二公於昆陽斬阜賜於漢津當此時也九州鼎沸四海淵湧言帝者二三稱王者四五若克東齊難勝之寇降赤眉不計之虜彭寵以望異內隕龐萌以叛主取誅隗戎以背信斃軀公孫以離心授首爾乃廟勝而後動衆計定而後行師於時戰克之將籌畫之臣承詔奉命者猶寵違令犯旨者顛危故曰建武之行師也計出於主心勝決於廟堂故竇融因聲而景附馬援一見而歎息諸葛亮曰曹子建論光武將則難比於韓周謀臣則不敵良平時人談者亦以為然吾以此言誠能美大光武之德而有誣一代之俊異何哉追觀光武二十八將下及馬援之徒忠貞智勇無所不有篤而論之非減曩時所以張陳特顯於前者乃自高帝動多闊疏故良平得廣於忠信彭勃得橫行於外語有曲突徙薪為彼人焦頭爛額為上客此言雖小有似二祖之時也光武神略計較生於天心故帷幄無他所思六奇無他所出於是以謀合議同共成王業而已光武稱鄧禹曰孔子有回而門人益親歎吳漢曰將軍差強吾意其武力可及其忠不可及與諸臣計事常令馬援後言以為援策每與諧合此皆明君知臣之審也光武上將非減於韓周謀臣非劣於良平原其光武策慮深遠有杜漸曲突之明高帝能疏故陳張韓周有焦爛之功耳金樓子第四卷立言篇論諸子老子長於養性不可以臨危難商鞅長於理法不可以從教化蘇張長於馳辭不可以結盟誓白起長於攻取不可以廣衆子胥長於圖敵不可以謀身尾生長於守信不可以應變王嘉長於遇明君不可以事暗主許子將長於明臧否不可以養人物此任長之術者也長短經卷一任長論讓奪范蠡以去貴為高虞卿以舍相為功太伯以三讓為仁燕噲以辭國為禍堯舜以禪位為聖孝哀以授童為愚武王以取殷為義王莽以奪漢為篡桓公以管仲為霸秦王以趙高喪國此皆趣同而事異也明者以興暗者以辱亂也長短經與先帝論黃忠忠之名望素非關馬之倫也而今便令同列馬張在近親見其功尚可諭指關遙聞之恐必不悅得毋不可乎三國志卷三十六蜀志黃忠傳與先帝論薦劉巴運籌策於帷幄之中吾不如子初遠矣若提枹鼓會軍門使百姓喜勇當與人議之耳三國志卷三十九蜀志劉巴傳裴注引零陵賢傳論斬馬謖夫亮所以能制勝於天下者用法明也是以楊干亂法魏絳戮其僕今四海分裂兵交方始若復廢法何用討賊耶三國志卷三十九蜀志馬謖傳裴注引襄陽記論來敏敏亂群過於孔文舉宋書卷六十二王微傳稱許靖靖人望不可失也借其名以竦動宇內稱龐統廖立龐統廖立楚之良才當贊興世業者也三國志卷四十蜀志廖立傳稱蔣琬公琰託志忠雅當與吾共贊王業者也三國志卷四十四蜀志蔣琬傳又稱蔣琬蔣琬社稷之器非百里之才也其為政以安民為本不以修飾為先願主公重加察之同前稱董厥董令史良士也吾每與之言思慎宜適蜀志本傳稱殷禮不意東吳菰蘆中乃有奇偉如此人太平御覽卷一千答惜赦治世以大德不以小惠故匡衡吳漢不願為赦先帝亦言吾周旋陳元方鄭康成間每見啓告治亂之道悉矣曾不語赦也若劉景升季玉父子歲歲赦宥何益於治也三國志卷三十三蜀志後主傳裴引華陽國志答薑維彼本無戰情所以固請戰者以示武於其衆耳將在軍君命有所不受苟能制吾豈千里而請戰耶蜀志本傳裴注引漢晉春秋諭參佐停更夫統武行師以大信為本得原失信古人所惜去者束裝以待期妻子鶴望而計日雖臨征難義所不廢蜀志本傳裴注引論諫若留外人則當留兵兵留則無所食一不易也加夷新傷破父兄死喪留外人而無兵者必成禍患二不易也又夷屢有廢殺之罪自嫌釁重若留外人終不相信三不易也今吾欲使不留兵不運糧而綱紀粗定夷漢粗安故耳蜀志本傳裴注引漢晉春秋謝賀者普天之下莫非漢民國家威力未舉使百姓困於豺狼之吻一夫有死皆亮之罪以此相賀能不為愧蜀志本傳裴注引司馬季主墓碑銘司馬季主墓碑銘玄漠太寂混合陰陽天地交判萬品滋彰先生理著分別柔剛鬼神以觀六度顯名真誥卷十四柘東城石刻碑即仆蠻為漢奴夷畏誓常以右搘捂南中紀功碑陰銘萬歲之後勝我者過此黃陵廟記黃陵廟記僕躬耕南陽之畝遂蒙劉氏顧草廬勢不可卻計事善之於是情好日密相拉總師趨蜀道履黃牛因覩江山之勝亂石排空驚濤拍岸斂巨石於江中崔嵬巑岏列作三峰平治洚水順之其道非神扶助於禹人力奚能致此耶僕縱步環覽乃見江左大山壁立林麓峰巒如畫熟視於大江重復石壁間有神像景見焉鬢髮鬚眉冠裳宛然如采畫者前豎一旌旗右駐一黃犢猶有董工開導之勢古傳所載黃龍助禹開江治水九載而功成信不誣也惜乎廟貌廢去使人太息神有功助禹開江不事鑿斧順濟舟航當廟食茲土僕復而興之再建其廟號目之曰黃牛廟以顯神功梁甫吟步出齊東門遙望蕩陰里里中有三墳纍纍正相似問是誰家子田疆古冶氏力能排南山文能絶地紀一朝被讒言二桃殺三士誰能為此謀相國齊晏子藝文類聚卷十九雜言我心如稱不能為人作輕重北堂書鈔卷三十七二十八宿分野二十八宿分野角亢氐鄭兗州東郡入角一度東平任城山陽入角六度泰山入角十二度濟北陳留入亢五度濟陰入氐一度東平入氐七度房心宋豫州潁川入房一度汝南入房二度沛郡入房四度梁國入房五度淮陽入心一度魯國入心三度楚國入心四度箕尾燕幽州營州入箕中十度上谷入尾一度漁陽入尾三度右北平入尾七度西河上郡北地遼西東入尾十度涿郡入尾十六度渤海入箕一度樂浪入箕三度玄菟入箕六度廣陽入箕九度斗牽牛須女吳越揚州九江入斗一度廬江入斗六度豫章入斗十度丹陽入斗十六度會稽入牛一度臨淮入牛四度廣陵入牛八度泗水入女一度六安入牛六度虛危齊青州齊國入虛六度北海入虛九度濟南入危一度樂安入危四度東萊入危九度平原入危十一度淄州入危十四度營室東壁衛并州安定入營室一度天水入營室八度隴西入營室四度酒泉入營室十一度張掖入營室十二度武都入東壁一度金城入東壁四度武威入東壁六度燉煌入東壁八度奎婁胃魯徐州東海入奎一度琅邪入奎一度琅密入婁一度城陽入婁九度膠東入胃一度昴畢趙冀州魏郡入昴一度巨鹿入昴三度常山入昴五度廣平入昴七度中山入昴一度清河入昴九度信都入畢三度趙郡入畢八度安平入畢四度河間入畢十度真定入畢十三度觜參魏益州廣漢入觜一度越巂入觜三度蜀郡入觜一度犍為入參三度牂牁入參五度巴郡入參五度漢中入參九度益州入參七度東井輿鬼秦雍州雲中入東井一度定襄入東井八度雁