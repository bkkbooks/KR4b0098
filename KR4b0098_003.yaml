body:
  text: 卷三便宜十六策治國第一治國之要其猶治家治家者務立其本本正則末正矣夫本者倡始也末者應和也倡始者天地也應和者萬物也萬物之事非天不生非地不長非人不成故人君舉措應天若北辰為之主台輔為之臣佐列宿為之官屬衆星為之人民是以北辰不可變改台輔不可失度列宿不可錯繆此天之象也故立臺榭以觀天文郊祀逆氣以配神靈所以務天之本也耕農社稷山林川澤祀祠祀福所以務地之本也庠序之禮八佾之樂明堂辟雍高牆宗廟所以務人之本也故本者經常之法規矩之要圓鑿不可以方枘鉛刀不可以砍伐此非常用之事不能成其功非常用之器不可成其巧故天失其常則有逆氣地失其常則有枯敗人失其常則有患害經曰非先王之法服不敢服此之謂也君臣第二君臣之政其猶天地之象天地之象明則君臣之道具矣君以施下為仁臣以事上為義二心不可以事君疑政不可以授臣上下好禮則民易使上下和順則君臣之道具矣君以禮使臣臣以忠事君君謀其政臣謀其事政者正名也事者勸功也君勸其政臣勸其事則功名之道俱立矣是故君南面向陽著其聲響臣北面向陰見其形景聲響者教令也形景者功效也教令得中則功立功立則萬物蒙其福是以三綱六紀有上中下上者為君臣中者為父子下者為夫婦各修其道福祚至矣君臣上下以禮為本父子上下以恩為親夫婦上下以和為安上不可以不正下不可以不端上枉下曲上亂下逆故君惟其政臣惟其事是以明君之政修則忠臣之事舉學者思明師仕者思明君故設官職之全序爵祿之位陳璇璣之政建台輔之佐私不亂公邪不干正此治國之道具矣視聽第三視聽之政謂視微形聽細聲形微而不見聲細而不聞故明君視微之幾聽細之大以內和外以外和內故為政之道務於多聞是以聽察採納衆下之言謀及庶士則萬物當其目衆音佐其耳故經云聖人無常心以百姓為心目為心視口為心言耳為心聽身為心安故身之有心若國之有君以內和外萬物昭然觀日月之形不足以為明聞雷霆之聲不足以為聽故人君以多見為智多聞為神夫五音不聞無以別宮商五色不見無以別玄黃蓋聞明君者常若晝夜晝則公事行夜則私事興或有興嗟之怨而不得聞或有進善之忠而不得信怨聲不聞則枉者不得伸進善不納則忠者不得信邪者容其姦故書云天視自我民視天聽自我民聽此之謂也納言第四納言之政謂為諫諍所以采衆下之謀也故君有諍臣父有諍子當其不義則諍之將順其美匡救其惡惡不可順美不可逆順惡逆美其國必危夫人君拒諫則忠臣不敢進其謀而邪臣專行其政此為國之害也故有道之國危言危行無道之國危行言孫上無所聞下無所説故孔子不恥下聞周公不恥下賤故行成名著後世以為聖是以屋漏在下止之在上上漏不止下不可居矣察疑第五察疑之政謂察朱紫之色別宮商之音故紅紫亂朱色淫聲疑正樂亂生於遠疑生於惑物有異類形有同色白石如玉愚者寶之魚目似珠愚者取之狐貉似犬愚者蓄之栝蔞似瓜愚者食之故趙高指鹿為馬秦王不以為疑范蠡貢越薑女吳王不以為惑計疑無定事事疑無成功故聖人不可以意説為明必信夫卜占其吉凶書曰三人占必從二人之言而有大疑者謀及庶人故孔子云明君之治不患人之不己知患不知人也不患外不知內惟患內不知外不患下不知上惟患上不知下不患賤不知貴惟患貴不知賤故士為知己者死女為悅己者容馬為策己者馳神為通己者明故人君決獄行刑患其不明或無罪被辜或有罪蒙恕或強者專辭或弱者侵怨或直者被枉或屈者不伸或有信而見疑或有忠而被害此皆招天之逆氣災暴之患禍亂之變惟明君治獄案刑問其情辭如不虛不匿不枉不弊觀其往來察其進退聽其聲響瞻其看視形懼聲哀來疾去遲還顧吁嗟此怨結之情不得伸也下瞻盜視見怯退還喘息卻聽沈吟腹計語言失度來遲去速不敢反顧此罪人欲自免也孔子曰視其所以觀其所由察其所安人焉廋哉人焉廋哉治人第六治人之道謂道之風化陳示所以也故經云陳之以德義而民與行示之以好惡而民知禁日月之明衆下仰之乾坤之廣萬物順之是以堯舜之君遠夷貢獻桀紂之君諸夏背叛非天移動其人是乃上化使然也故治人猶如養苗先去其穢故國之將興而伐於國國之將衰而伐於山明君之治務知人之所患卑服之吏小國之臣故曰卑服無所不剋莫知其極剋食於民而人有飢乏之變則生亂逆唯勸農業無奪其時唯薄賦斂無盡民財如此富國安家不亦宜乎夫有國有家者不患貧而患不安故唐虞之政利人相逢用天之時分地之利以豫凶年秋有餘糧以給不足天下通財路不拾遺民無去就故五霸之世不足者奉於有餘故今諸侯好利利興民爭災害並起強弱相侵躬耕者少未作者多民如浮雲手足不安經云不貴難得之貨使民不為盜不貴無用之物使民心不亂各理其職是以聖人之政治也古者齊景公之時病民下奢侈不遂禮制周秦之宜去文就質而勸民之有利也夫作無用之器聚無益之貨金銀璧玉珠璣翡翠奇珍異寶遠方所出此非庶人之所用也錦繡纂組綺羅綾縠玄黃衣帛此非庶人之所服也雕文刻鏤伎作之巧難成之功妨害農事輜軿出入袍裘索襗此非庶人之所飾也重門畫獸蕭牆數仞冢墓過度竭財高尚此非庶人之所居也經云庶人之所好者唯躬耕勤苦謹身節用以養父母制之以財用之以禮豐年不奢凶年不儉素有蓄積以儲其後此治人之道不亦合於四時之氣乎舉措第七舉措之政謂舉直措諸枉也夫治國猶於治身治身之道務在養神治國之道務在舉賢是以養神求生舉賢求安故國之有輔如屋之有柱柱不可細輔不可弱柱細則害輔弱則傾故治國之道舉直措諸枉其國乃安夫柱以直木為堅輔以直士為賢直木出於幽林直士出於衆下故人君選舉必求隱處或有懷寶迷邦匹夫同位或有高才卓絶不見招求或有忠賢孝弟鄉里不舉或有隱居以求其志行義以達其道或有忠質於君朋黨相讒堯舉逸人湯招有莘周公采賤皆得其人以致太平故人君懸賞以待功設位以待士不曠庶官闢四門以興治務玄纁以聘幽隱天下歸心而不仁者遠矣夫所用者非所養所養者非所用貧陋為下財色為上讒邪得志忠直遠放玄纁不行焉得賢輔哉若夫國危不治民不安居此失賢之過也夫失賢而不危得賢而不安未之有也為人擇官者亂為官擇人者治是以聘賢求士猶嫁娶之道也未有自嫁之女出財為婦故女慕財聘而達其貞士慕玄纁而達其名以禮聘士而其國乃寧矣考黜第八考黜之政謂遷善黜惡明主在上心昭於天察知善惡廣及四海不敢遺小國之臣下及庶人進用賢良退去貪懦明良上下企及國理衆賢雨集此所以勸善黜惡陳之休咎故考黜之政務知人之所苦其苦有五或有小吏因公為私乘權作姦左手執戈右手治生內侵於官外採於民此所苦一也或有過重罰輕法令不均無罪被辜以致滅身或有重罪得寬扶強抑弱加以嚴刑枉責其情此所苦二也或有縱罪惡之吏害告訴之人斷絶語辭蔽藏其情掠劫亡命其枉不常其所苦三也或有長吏數易守宰兼佐為政阿私所親枉剋所恨逼切為行偏頗不承法制更因賦斂傍課採利送故待新夤緣徵發詐偽儲備以成家産此所苦四也或有縣官慕功賞罰之際利人之事買賣之費多所裁量專其價數民失其職其所苦五也凡此五事民之五害有如此者不可不黜無此五者不可不遷故書云三載考績黜陟幽明治軍第九治軍之政謂治邊境之事匡救大亂之道以威武為政誅暴討逆所以存國家安社稷之計是以有文事必有武備故含血之蠹必有爪牙之用喜則共戲怒則相害人無爪牙故設兵革之器以自輔衛故國以軍為輔君以臣為佐輔強則國安輔弱則國危在於所任之將也非民之將非國之輔非軍之主故治國以文為政治軍以武為計治國不可以不從外治軍不可以不從內內謂諸夏外謂戎狄戎狄之人難以理化易以威服禮有所任威有所施是以黃帝戰於涿鹿之野唐堯戰於丹浦之水舜伐有苗禹討有扈自五帝三王至聖之主德化如斯尚加之以威武故兵者凶器不得已而用之夫用兵之道先定其謀然後乃施其事審天地之道察衆人之心習兵革之器明賞罰之理觀敵衆之謀視道路之險別安危之處占主客之情知進退之宜順機會之時設守禦之備強征伐之勢揚士卒之能圖成敗之計慮生死之事然後乃可出軍任將張禽敵之勢此為軍之大略也夫將者人之司命國之利器先定其計然後乃行其令若漂水暴流其獲若鷹隼之擊物靜若弓弩之張動如機關之發所向者破而勍敵自滅將無思慮士無氣勢不齊其心而專其謀雖有百萬之衆而敵不懼矣非讎不怨非敵不戰工非魯般之目無以見其工巧戰非孫武之謀無以出其計運夫計謀欲密攻敵欲疾獲若鷹擊戰如河決則兵未勞而敵自散此用兵之勢也故善戰者不怒善勝者不懼是以智者先勝而後求戰暗者先戰而後求勝勝者隨道而修途敗者斜行而失路此順逆之計也將服其威士專其力勢不虛動運如圓石從高墜下所向者碎不可救止是以無敵於前無敵於後此用兵之勢也故軍以奇計為謀以絶智為主能柔能剛能弱能強能存能亡疾如風雨舒如江海不動如泰山難測如陰陽無窮如地充實如天不竭如江河終始如三光生死如四時衰旺如五行奇正相生而不可窮故軍以糧食為本兵以奇正為始器械為用委積為備故國困於貴買貧於遠輸攻不可再戰不可三量力而用用多則費罷去無益則國可寧也罷去無能則國可利也夫善攻者敵不知其所守善守者敵不知其所攻故善攻者不以兵革善守者不以城郭是以高城深池不足以為固堅甲鋭兵不足以為強敵欲固守攻其無備敵欲興陳出其不意我往敵來謹設所居我起敵止攻其左右量其合敵先擊其實不知守地不知戰日可備者衆則專備者寡以慮相備強弱相攻勇怯相助前後相赴左右相趨如常山之蛇首尾俱到此救兵之道也故勝者全威謀之於身知地形勢不可豫言議之知其得失詐之知其安危計之知其多寡形之知其生死慮之知其苦樂謀之知其善備故兵從生擊死避實擊虛山陵之戰不仍其高水土之戰不逆其流草上之戰不涉其深平地之戰不逆其虛道上之戰不逆其孤此五者兵之利地之所助也夫軍成於用勢敗於謀漏飢於遠輸渴於躬井勞於煩擾佚於安靜疑於不戰惑於見利退於刑罰進於賞賜弱於見逼強於用勢困於見圍懼於先至驚於夜呼亂於暗昧迷於失道窮於絶地失於暴卒得於豫計故立旌旗以視其目擊金鼓以鳴其耳設斧鉞以齊其心陳教令以同其道興賞賜以勸其功行誅伐以防其偽晝戰不相聞旌旗為之舉夜戰不相見火鼓為之起教令有不從斧鉞為之使不知九地之便則不知九變之道天之陰陽地之形名人之腹心知此三者獲處其功知其士乃知其敵不知其士則不知其敵不知其敵每戰必殆故軍之所擊必先知其左右士卒之心五間之道軍之所親將之所厚非聖智不知用非仁賢不能使五間得其情則民可用國可長保故兵求生則備不得已則鬭靜以理安動以理威無恃敵之不至恃吾之不可擊以近待遠以逸待勞以飽待飢以實待虛以生待死以衆待寡以旺待衰以伏待來整整之旌堂堂之鼓當順其前而覆其後固其險阻而營其表委之以利柔之以害此治軍之道全矣賞罰第十賞罰之政謂賞善罰惡也賞以興功罰以禁姦賞不可不平罰不可不均賞賜知其所施則勇士知其所死刑罰知其所加則邪惡知其所畏故賞不可虛施罰不可妄加賞虛施則勞臣怨罰妄加則直士恨是以羊羹有不均之害楚王有信讒之敗夫將專恃生殺之威必生可殺必殺可生忿怒不詳賞罰不明教令不常以私為公此國之五危也賞罰不明教令有不從必殺可生衆姦不禁必生可殺士卒散亡忿怒不詳威武不行賞罰不明下不勸功政教不當法令不從以私為公人有二心故衆姦不禁則不可久士卒散亡其衆必寡威武不行見敵不起下不勸功上無強輔法令不從事亂不理人有二心其國危殆故防姦以政救奢以儉忠直可使理獄廉平可使賞罰賞罰不曲則人死服路有飢人廄有肥馬可謂亡人而自存薄人而自厚故人君先募而後賞先令而後誅則人親附畏而愛之不令而行賞罰不正則忠臣死於非罪而邪臣起於非功賞賜不避怨讎則齊桓得管仲之力誅罰不避親戚則周公有殺弟之名書云無偏無黨王道蕩蕩無黨無偏王道平平此之謂也喜怒第十一喜怒之政謂喜不應喜無喜之事怒不應怒無怒之物喜怒之間必明其類怒不犯無罪之人喜不從可戮之士喜怒之際不可不詳喜不可縱有罪怒不可戮無辜喜怒之事不可妄行行其私而廢其功將不可發私怒而興戰必用衆心苟合以私忿而合戰則用衆必敗怒不可以復悅喜不可以復怒故以文為先以武為後先勝則必後負先怒則必後悔一朝之忿而亡其身故君子威而不猛忿而不怒憂而不懼悅而不喜可忿之事然後加之威武威武加則刑罰施刑罰施則衆姦塞不加威武則刑罰不中刑罰不中則衆惡不理其國亡治亂第十二治亂之政謂省官并職去文就質也夫綿綿不絶必有亂結纖纖不伐必成妖孽夫三綱不正六紀不理則大亂生矣故治國者圓不失規方不失矩本不失末為政不失其道萬事可成其功可保夫三軍之亂紛紛擾擾各惟其理明君治其綱紀政治當有先後先理綱後理紀先理令後理罰先理近後理遠先理內後理外先理本後理末先理強後理弱先理大後理小先理身後理人是以理綱則紀張理令則罰行理近則遠安理內則外端理本則末通理強則弱伸理大則小行理上則下正理身則人敬此乃治國之道也教令第十三教令之政謂上為下教也非法不言非道不行上之所為人之所瞻也夫釋己教人是謂逆政正己教人是謂順政故人君先正其身然後乃行其令身不正則令不從令不從則生變亂故為君之道以教令為先誅罰為後不教而戰是謂棄之先習士卒用兵之道其法其五一曰使目習其旌旗指麾之變縱橫之術二曰使耳習聞金鼓之聲動靜行止三曰使心習刑罰之嚴爵賞之利四曰使手習五兵之便鬥戰之備五曰使足習周旋走趨之列進退之宜故號為五教教令軍陳各有其道左教青龍右教白虎前教朱雀後教玄武中央軒轅大將軍之所處左矛右戟前戈後弩中央旗鼓旗動俱起聞鼓則進聞金則止隨其指揮五陳乃理正陳之法旗鼓為之主一鼓舉其青旗則為直陳二鼓舉其赤旗則為鋭陳三鼓舉其黃旗則為方陳四鼓舉其白旗則為圓陳五鼓舉其黑旗則為曲陳直陳者木陳也鋭陳者火陳也方陳者土陳也圓陳者金陳也曲陳者水陳也此五行之陳輾轉相生衝對相勝相生為救相勝為戰相生為助相勝為敵凡結五陳之法五五相保五人為一長五長為一師五師為一枝五枝為一火五火為一撞五撞為一軍則軍士具矣夫兵利之所便務知節度短者持矛戟長者持弓弩壯者持旌旗勇者持金鼓弱者給糧牧智者為謀主鄉里相比五五相保一鼓整行二鼓習陳三鼓起食四鼓嚴辦五鼓就行聞鼓聽金然後舉旗出兵以次第一鳴鼓三通旌旗發揚舉兵先攻者賞卻退者斬此教令也斬斷第十四斬斷之政謂不從教令之法也其法有七一曰輕二曰慢三曰盜四曰欺五曰背六曰亂七曰誤此治軍之禁也當斷不斷必受其亂故設斧鉞之威以待不從令者誅之軍法異等過輕罰重令不可犯犯令者斬期會不到聞鼓不行乘寬自留避回自止初近後遠喚名不應車甲不具兵器不備此為輕軍輕軍者斬受令不傳傳令不審迷惑吏士金鼓不聞旌旗不覩此謂慢軍慢軍者斬食不稟糧軍不省兵賦賜不均阿私所親取非其物借貸不還奪人頭首以獲其功此謂盜軍盜軍者斬變改姓名衣服不鮮旌旗裂壞金鼓不具兵刃不磨器仗不堅矢不著羽弓弩無弦法令不行此為欺軍欺軍者斬聞鼓不進聞金不止按旗不伏舉旗不起指揮不隨避前向後縱發亂行折其弓弩之勢卻退不鬥宜左或右扶傷舉死自託而歸此謂背軍背軍者斬出軍行將士卒爭先紛紛擾擾車騎相連咽塞路道後不得先呼喚喧譁無所聽聞失亂行次兵刃中傷長短不理上下縱橫此謂亂軍亂軍者斬屯營所止問其鄉里親近相隨共食相保不得越次強入他伍干誤次第不可呵止度營出入不由門戶不自啓白姦邪所起知者不告罪同一等合人飲酒阿私取受大言警語疑惑吏士此謂誤軍誤軍者斬斬斷之後此萬事乃理也軍有七禁一曰輕二曰慢三曰盜四曰欺五曰背六曰亂七曰誤此治軍之禁也若朝會不到聞鼓不行乘寬自留回避務止初近而後遠喚名而不應軍甲不具兵器不備此謂輕軍有此者斬之受令不傳傳之不審以惑吏士金鼓不聞旌旗不覩此謂慢軍有此者斬之食不廩糧軍不部兵賦賜不均阿私所親取非其物借貸不還奪人頭首以獲功名此謂盜軍有此者斬之若變易姓名衣服不鮮金鼓不具兵刃不磨器仗不堅矢不著羽弓弩無絃主者吏士法令不從此謂欺軍有此者斬之聞鼓不行叩金不止按旗不伏舉旗不起指麾不隨避前在後縱發亂行折兵弩之勢卻退不鬭或左或右扶傷舉死因託歸還此謂背軍有此者斬之出軍行將士卒爭先紛紛擾擾軍騎相連咽塞道路後不得前呼喚喧譁無所聽聞失行亂次兵刃中傷長將不理上下縱橫此謂亂軍有此者斬之屯營所止問其鄉里親近相隨共食相保呼召不得越入他位干誤次第不可呵止度營出入不由門戶不自啓白姦邪所起知者不告罪同一等合人飲食阿私所受大言驚語疑惑吏士此謂誤軍有此者斬之思慮第十五思慮之政謂思近慮遠也夫人無遠慮必有近憂故君子思不出其位思者正謀也慮者思事之計也非其位不謀其政非其事不慮其計大事起於難小事起於易故欲思其利必慮其害欲思其成必慮其敗是以九重之臺雖高必壞故仰高者不可忽其下瞻前者不可忽其敗是以秦穆公伐鄭二子知其害吳王受越女子胥知其敗虞受晉璧馬宮之奇知其害宋襄公練兵車目夷知其負凡此之智思慮之至可謂明矣夫隨覆陳之軌追陷溺之後以赴其前何及之有故秦承霸業不及堯舜之道夫危生於安亡生於存亂生於治君子視微知著見始知終禍無從起此思慮之政也陰察第十六陰察之政譬喻物類以覺悟其意也外傷則內孤上惑則下疑疑則親者不用惑則視者失度失度則亂謀亂謀則國危國危則不安是以思者慮遠遠慮者安無慮者危富者得志貧者失時甚愛太費多藏厚亡竭財相買無功自專憂事衆者煩煩生於怠船蕩則水入囊穿則內空山小無獸水淺無魚樹弱無巢牆壞屋傾隄決水漾疾走者仆安行者遲乘危者淺履冰者懼涉泉者溺遇水者渡無楫者不濟失侶者遠顧賞罰者省功不誠者失信唇亡齒寒毛落皮單阿私亂言偏聽者生患善謀者勝惡謀者分善之勸惡如春雨澤麒麟易乘駑駘難習不視者盲不聽者聾根傷則葉枯葉枯則花落花落則實亡柱細則屋傾本細則末撓下小則上崩不辨黑白棄土取石虎羊同群衣破者補帶短者續弄刀者傷手打跳者傷足洗不必江河要之卻垢馬不必騏驥要之疾足賢不必聖人要之智通總之有五德一曰禁暴止兵二曰賞賢罰罪三曰安仁和衆四曰保人定功五曰豐撓拒讒此之謂五德
