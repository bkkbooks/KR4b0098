body:
  text: 卷四將苑兵權兵權夫兵權者是三軍之司命主將之威勢將能執兵之權操兵之要勢而臨群下譬如猛虎加之羽翼而翱翔四海隨所遇而施之若將失權不操其勢亦如魚龍脫於江湖欲求游洋之勢奔濤戲浪何可得也逐惡夫軍國之弊有五害焉一曰結黨相連毀譖賢良二曰侈其衣服異其冠帶三曰虛誇妖術詭言神道四曰專察是非私以動衆五曰伺候得失陰結敵人此所謂姦僞悖德之人可遠而不可親也知人性知人性夫知人之性莫難察焉美惡既殊情貌不一有溫良而為詐者有外恭而內欺者有外勇而內怯者有盡力而不忠者然知人之道有七焉一曰間之以是非而觀其志二曰窮之以辭辨而觀其變三曰咨之以計謀而觀其識四曰告之以禍難而觀其勇五曰醉之以酒而觀其性六曰臨之以利而觀其廉七曰期之以事而觀其信將材夫將材有九道之以德齊之以禮而知其饑寒察其勞苦此之謂仁將事無苟免不為利撓有死之榮無生之辱此之謂義將貴而不驕勝而不恃賢而能下剛而能忍此之謂禮將奇變莫測動應多端轉禍為福臨危制勝此之謂智將進有厚賞退有嚴刑賞不逾時刑不擇貴此之謂信將足輕戎馬氣蓋千夫善固疆埸長於劍戟此之謂步將登高履險馳射如飛進則先行退則後殿此之謂騎將氣凌三軍志輕強虜怯於小戰勇於大敵此之謂猛將見賢若不及從諫如順流寬而能強勇而多計此之謂大將將器將之器其用大小不同若乃察其姦伺其禍為衆所服此十夫之將夙興夜寐言詞密察此百夫之將直而有慮勇而能鬥此千夫之將外貌桓桓中情烈烈知人勤勞悉人饑寒此萬夫之將進賢進能日慎一日誠信寬大間於理亂此十萬人之將仁愛洽於下信義服鄰國上知天文中察人事下識地理四海之內視如室家此天下之將將弊夫為將之道有八弊焉一曰貪而無厭二曰妬賢嫉能三曰信讒好佞四曰料彼不自料五曰猶豫不自決六曰荒淫於酒色七曰姦詐而自怯八曰狡言而不以禮將志將志兵者凶器將者危任是以器剛則缺任重則危故善將者不恃彊不怙勢寵之而不喜辱之而不懼見利不貪見美不淫以身殉國一意而已將善將有五善四欲五善者所謂善知敵之形勢善知進退之道善知國之虛實善知天時人事善知山川險阻四欲者所謂戰欲奇謀欲密衆欲靜心欲一將剛善將者其剛不可折其柔不可卷故以弱制強以柔制剛純柔純弱其勢必削純剛純強其勢必亡不柔不剛合道之常將驕吝將驕吝將不可驕驕則失禮失禮則人離人離則衆叛將不可吝吝則賞不行賞不行則士不致命士不致命則軍無功無功則國虛國虛則寇實矣孔子曰如有周公之才之美使驕且吝其餘不足觀也已將疆將疆將有五彊八惡高節可以厲俗孝弟可以揚名信義可以交友沈慮可以容衆力行可以建功此將之五彊也謀不能料是非禮不能任賢良政不能正刑法富不能濟窮厄智不能備未形慮不能防微密達不能舉所知敗不能無怨謗此之謂八惡也出師古者國有危難君簡賢能而任之齊三日入太廟南面而立將北面太師進鉞於君君持鉞柄以授將曰從此至軍將軍其裁之復命曰見其虛則進見其實則退勿以身貴而賤人勿以獨見而違衆勿恃功能而失忠信士未坐勿坐士未食勿食同寒暑等勞逸齊甘苦均危患如此則士必盡死敵必可亡將受詞鑿凶門引軍而出君送之跪而推轂曰進退惟時軍中事不由君命皆由將出若此則無天於上無地於下無敵於前無主於後是以智者為之慮勇者為之鬥故能戰勝於外功成於內揚名於後世福流於子孫矣擇材夫師之行也有好鬥樂戰獨取彊敵者聚為一徒名曰報國之士有氣蓋三軍材力勇健者聚為一徒名曰突陳之士有輕足善步走如奔馬者聚為一徒名曰搴旗之士有騎射如飛發無不中者聚為一徒名曰爭鋒之士有射必中中必死者聚為一徒名曰飛馳之士有善發強弩遠而必中者聚為一徒名曰摧鋒之士此六軍之善士各因其能而用之也智用夫為將之道必順天因時依人以立勝也故天作時不作而人作是謂逆時時作天不作而人作是謂逆天天作時作而人不作是謂逆人智者不逆天亦不逆時亦不逆人也不陳古之善理者不師善師者不陳善陳者不戰善戰者不敗善敗者不亡昔者聖人之治理也安其居樂其業至老不相攻伐可謂善理者不師也若舜修典刑咎繇作士師人不干令刑無可施可謂善師者不陳若禹伐有苗舜舞干羽而苗民格可謂善陳者不戰若齊桓南服彊楚北服山戎可謂善戰者不敗若楚昭遭禍奔秦求救卒能返國可謂善敗者不亡矣將誡書曰狎侮君子罔以盡人心狎侮小人罔以盡人力固行兵之要務攬英雄之心嚴賞罰之科總文武之道操剛柔之術說禮樂而敦詩書先仁義而後智勇靜如潛魚動若奔獺喪其所連折其所強耀以旌旗戒以金鼓退若山移進如風雨擊崩若摧合戰如虎迫而容之利而誘之亂而取之卑而驕之親而離之強而弱之有危者安之有懼者悅之有叛者懷之有冤者申之有彊者抑之有弱者扶之有謀者親之有讒者覆之獲財者與之不倍兵以攻弱不恃衆以輕敵不傲才以驕人不以寵而作威先計而後動知勝而始戰得其財帛不自寶得其子女不自使將能如此嚴號申令而人願鬥則兵合刃接而人樂死矣戒備戒備夫國之大務莫先於戒備若夫失之毫釐則差若千里覆軍殺將勢不踰息可不懼哉故有患難君臣旰食而謀之擇賢而任之若乃居安而不思危寇至而不知懼此謂燕巢於幕魚游於鼎亡不俟夕矣傳曰不備不虞不可以師又曰豫備無虞古之善政又曰蜂蠆尚有毒而況國乎無備雖衆不可恃也故曰有備無患故三軍之行不可無備也習練夫軍無習練百不當一習而用之一可當百故仲尼曰不教而戰是謂棄之又曰善人教民七年亦可以即戎矣然則即戎之不可不教教之以禮義誨之以忠信誡之以典刑威之以賞罰故人知勸然後習之或陳而分之坐而起之行而止之走而卻之別而合之散而聚之一人可教十人十人可教百人百人可教千人千人可教萬人可教三軍然後教練而敵可勝矣軍蠹夫三軍之行有探候不審烽火失度後期犯令不應時機阻亂師徒乍前乍後不合金鼓上不恤下削斂無度營私徇己不恤饑寒非言妖辭妄陳禍福無事喧雜驚惑將吏勇不受制專而陵上侵竭府庫擅給其財此九者三軍之蠹有之必敗也腹心夫為將者必有腹心耳目爪牙無腹心者如人夜行無所措手足無手足者如冥然而居不知運動無爪牙者如饑人食毒物無不死矣故善將者必有博聞多智者為腹心沈審謹密者為耳目勇悍善敵者為爪牙謹候夫敗軍喪師未有不因輕敵而致禍者故師出以律失律則凶律有十五焉一曰慮間諜明也二曰詰誶候謹也三曰勇敵衆不撓也四曰廉見利思義也五曰平賞罰均也六曰忍善含恥也七日寬能容衆也八曰信重然諾也九曰敬禮賢能也十曰明不納讒也十一曰謹不違禮也十二曰仁義養士卒也十三曰忠以身殉國也十四曰分知止足也十五曰謀自料知他也機形夫以愚克智逆也以智克愚順也以智克智機也其道有三一曰事二曰勢三曰情事機作而不能應非智也勢機動而不能制非賢也情機發而不能行非勇也善將者必因機而立勝重刑吳起曰鼓鼙金鐸所以威耳旌幟所以威目禁令刑罰所以威心耳威以聲不可不清目威以容不可不明心威以刑不可不嚴三者不立士可怠也故曰將之所麾莫不心移將之所指莫不前死矣善將善將古之善將者有四示之以進退故人知禁誘之以仁義故人知禮重之以是非故人知勸決之以賞罰故人知信禁禮勸信師之大經也未有綱直而目不舒也故能戰必勝攻必取庸將不然退則不能止進則不能禁故與軍同亡無勸戒則賞罰失度人不知信而賢良退伏諂頑登用是以戰必敗散也審因夫因人之勢以伐惡則黃帝不能與爭威矣因人之力以決勝則湯武不能與爭功矣若能審因而加之威勝則萬夫之雄將可圖四海之英豪受制矣兵勢兵勢夫行兵之勢有三焉一曰天二曰地三曰人天勢者日月清明五星合度慧孛不殃風氣調和地勢者城峻重崖洪波千里石門幽洞羊腸曲沃人勢者主聖將賢三軍由禮士卒用命糧甲堅備善將者因天之時就地之勢依人之利則所向者無敵所擊者萬全矣勝敗賢才居上不肖居下三軍悅樂士卒畏服相議以勇鬭相望以威武相勸以刑賞此必勝之徵也士卒惰慢三軍數驚下無禮信人不畏法相恐以敵相語以利相囑以禍福相惑以妖言此必敗之徵也假權夫將者人命之所縣也成敗之所繫也禍福之所倚也而上不假之以賞罰是猶束猿猱之手而責之以騰捷膠離婁之目而使之辨青黃不可得也若賞移在權臣罰不由主將人苟自利誰懷鬥心雖伊呂之謀韓白之功而不能自衛也故孫武曰將之出君命有所不受亞夫曰軍中聞將軍之命不聞有天子之詔哀死古之善將者養人如養己子有難則以身先之有功則以身後之傷者泣而撫之死者哀而葬之饑者捨食而食之寒者解衣而衣之智者禮而祿之勇者賞而勸之將能如此所向必捷矣三賓夫三軍之行也必有賓客群議得失以資將用有詞若縣流奇謀不測博聞廣見多藝多才此萬夫之望可引為上賓有猛若熊虎捷若騰猿剛如鐵石利若龍泉此一時之雄可以為中賓有多言或中薄技小才常人之能此可引為下賓後應後應若乃圖難於易為大於細先動後用刑於無刑此用兵之智也師徒已列戎馬交馳強弩才臨短兵又接乘威布信敵人告急此用兵之能也身衝矢石爭勝一時成敗未分我傷彼死此用兵之下也便利便利夫草木叢集利以遊逸重塞山林利以不意前林無隱利以潛伏以少擊衆利以日莫以衆擊寡利以清晨強弩長兵利以捷次踰淵隔水風大暗昧利以博前擊後應機夫必勝之術合變之形在於機也非智者孰能見機而作乎見機之道莫先於不意故猛獸失險童子持戟以追之蜂蠆發毒壯夫倣徨而失色以其禍出不圖變速非慮也揣能古之善用兵者揣其能而料其勝負主孰聖也將孰賢也吏孰能也糧餉孰豐也士卒孰練也軍容孰整也戎馬孰逸也形勢孰險也賓客孰智也鄰國孰懼也財貨孰多也百姓孰安也由此觀之強弱之形可以決矣輕戰螫蟲之觸負其毒也戰士能勇恃其備也所以鋒鋭甲堅則人輕戰故甲不堅密與肉袒同弩不及遠與短兵同射不能中與無矢同中不能入與無鏃同探候不謹與無目同將帥不勇與無將同地勢夫地勢者兵之助也不知戰地而求勝者未之有也山林土陵邱阜大川此步兵之地土高山狹蔓衍相屬此車騎之地依山附澗高林深谷此弓弩之地草淺土平可前可後此長戟之地蘆葦相參竹樹交映此鎗矛之地也情勢夫將有勇而輕死者有急而心速者有貪而喜利者有仁而不忍者有智而心怯者有謀而情緩者是故勇而輕死者可暴也急而心速者可久也貪而喜利者可遺也仁而不忍者可芳也智而心怯者可窘也謀而情緩者可襲也擊勢古之善鬥者必先探敵情而後圖之凡師老糧絶百姓愁怨軍令不習器械不修計不先設卒不練習外救不至將吏刻剝賞罰輕懈營伍失次戰勝而驕可以攻之若用賢授能糧食羡餘甲兵堅利四鄰和睦大國應援糧備有餘政教不虛敵有此者引而計之整師夫出師行軍以整為勝若賞罰不明法令不信金之不止鼓之不進雖有百萬之師無益於用所謂整師者居則有禮動則有威進不可當退不可逼前後應接左右應旄與之安而不與之危其衆可合而不可離可用而不可疲矣厲士夫用兵之道尊之以爵贍之以財則士無不至矣接之以禮厲之以信則士無不死矣畜恩不倦法若畫一則士無不服矣先之以身後之以人則士無不勇矣小善必録小功必賞則士無不勸矣自勉聖人則天賢者法地智者則古驕者招毀妄者稔禍多語者寡信自奉者少恩賞於無功者離罰加無罪者怨喜怒不當者滅戰道夫林戰之道晝廣旌旗夜多金鼓利用短兵巧在設伏或攻于前或發於後叢戰之道利用劍楯將欲圖之先度其路十里一場五里一應偃戢旌旗特嚴金鼓令賊無措手足谷戰之道巧於設伏利以勇鬥輕足之士淩其高必死之士殿其後列強弩而衝之持短兵而繼之彼不得前我不得往水戰之道利在舟楫練習士卒以乘之多張旗幟以惑之嚴弓弩以申之持短兵以捍之設堅柵以衛之順其流而擊之夜戰之道利在機密或潛師以衝之以出其不意或多火鼓以亂其耳目馳而攻之可以勝矣和人夫用兵之道在於人和人和則不勸而自戰矣若將吏相猜士卒不服忠謀不用群下謗議讒慝互生雖有湯武之智而不能取勝於匹夫況衆人乎故傳曰兵猶火也不戢將自焚察情夫兵起而靜者恃其險也迫而挑戰者欲人之進也衆樹動者車來也塵土卑而廣者徒來也辭強而進驅者退也半進而半退者誘也杖而行者饑也見利而不進者勞也鳥集者虛也夜呼者恐也軍擾者將不重也旌旗動者亂也吏怒者倦也數賞者窘也數罰者困也先暴而後畏其衆者不靜之至也來委謝者欲休息也幣重而言甘者誘也將情夫為將之道軍井未汲將不言渴軍食未熟將不言饑軍火未然將不言寒軍幕未施將不言困夏不操扇雨不張蓋與衆同也威令夫一人之身百萬之衆束肩斂息重足俯聽莫敢仰視者法制使然也若乃上無刑罰下無禮義雖貴有天下富有四海而不能自免者桀紂之類也夫以匹夫之刑令之以賞罰而人不能逆其命者孫武穰苴之類也故令不可輕勢不可通東夷東夷之性薄禮少義捍急能鬥依山塹海憑險自固上下和睦百姓安樂未可圖也若上亂下離則可以行閒閒起則隙生隙生則修德以來之固甲兵而擊之其勢必克也南蠻南蠻多種性不能教連合朋黨失意則相攻居洞依山或聚或散西至崑崙東至洋海海産奇貨故人貪而勇戰春夏多疾疫利在疾戰不可久師也西戎西戎之性勇悍好利或城居或野處米糧少金貝多故人勇戰鬥難敗自磧石以西諸戎種繁地廣行險俗負強很故人多不臣當候之以外釁伺之以內亂則可破矣北狄北狄居無城郭隨逐水草勢利則南侵勢失則相遁長山廣磧足以自衛饑則捕獸飲乳寒則寢皮服裘奔走射獵以殺為務未可以道德懷之未可以兵戎服之漢不與戰其略有三漢卒且耕且戰故疲而怯虜但牧獵故逸而勇以疲敵逸以怯敵勇不相當也此不可戰一也漢長於步日馳百里虜長於騎日乃倍之漢逐虜發齎糧負甲而隨之虜逐漢則驅疾騎而運之運負之勢已殊走逐之形不等此不可戰二也漢戰多步虜戰多騎爭地形之勢則騎疾於步遲疾勢縣此不可戰三也不得已則莫若守邊守邊之道揀良將而任之訓鋭士而禦之廣營田而實之設鋒堠而待之候其虛而乘之因其衰而取之所謂資不費而寇自除矣人不疲而虜自寬矣
