body:
  text: 卷五南征表南征表初謂高定失其窟穴獲其妻子道窮計盡當歸首以取生也而邈蠻心異乃更殺人為盟糾合其類二千餘人求欲死戰北堂書鈔卷一百五十八軍令軍令軍行人將一斗乾飯不得持烏育及幔餘大車乘帳幔什光耀日往就與會矣北堂書鈔卷一百三十二算計算計今荊州非少人也而著籍者寡平居發調則人心不悅可語鎮南令國中凡有游戶者皆使自實因録以益衆可也通典一百四十八御覽二百九十九今上縣之戰更在賊門戰地平如案書鈔一百五十七
